<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Review Studio 2003 — Training Quest</title>
    <link rel="stylesheet" href="css/app.css">
    <link rel="stylesheet" href="css/xp.css">
</head>

<body class="body-texture">
<div class="wrapper">
    <div class="window">

        <div class="window-titlebar">Review Studio 2003 — Analyst Training Simulation</div>

        <div class="window-body">
            <div class="wizard-container">

                <!-- SIDEBAR MODULE LIST -->
                <div class="wizard-sidebar">
                    <h3>Training Modules</h3>
                    <ul id="sidebar-modules">
                        <!-- Filled dynamically -->
                    </ul>
                </div>

                <!-- MAIN SCREEN AREA -->
                <div class="wizard-content">
                    <div id="screen-container">
                        <!-- All screens injected by quest.js -->
                    </div>

                    <div class="wizard-controls">
                        <span class="wizard-btn" id="backBtn">Back</span>
                        <span class="wizard-btn" id="nextBtn">Next</span>
                    </div>
                </div>

            </div>
        </div>

    </div>
</div>

<script src="js/data.js"></script>
<script src="js/quest.js"></script>
</body>
</html>
